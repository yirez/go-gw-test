global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "api_gw"
    static_configs:
      - targets: ["host.docker.internal:8085"]
  - job_name: "auth_gw"
    static_configs:
      - targets: ["host.docker.internal:8084"]
  - job_name: "users_gw"
    static_configs:
      - targets: ["host.docker.internal:8087"]
  - job_name: "orders_gw"
    static_configs:
      - targets: ["host.docker.internal:8086"]
